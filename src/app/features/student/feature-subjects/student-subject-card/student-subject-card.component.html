<a
  class="nav-card-link"
  [routerLink]="linkCommands()"
  [queryParams]="queryParams()"
  [attr.aria-label]="('COMMON.ACTIONS.OPEN' | translate) + ' ' + subject().name"
>
  <mat-card class="nav-card" appearance="outlined">
    <div class="nav-card__avatar">{{ subject().name.charAt(0).toUpperCase() }}</div>
    <span class="nav-card__name">{{ subject().name }}</span>
    <mat-icon class="nav-card__arrow">chevron_right</mat-icon>
  </mat-card>
</a>
