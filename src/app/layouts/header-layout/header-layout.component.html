<mat-toolbar class="header-toolbar px-3 px-md-4">


  <button mat-icon-button [attr.aria-label]="'COMMON.ACCESSIBILITY.TOGGLE_NAVIGATION_MENU' | translate"
    (click)="onToggleSidenav()" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>

  <a class="fw-semibold app-title title-link" routerLink="/">IT-Cube</a>

  <div class="toolbar-actions">
    <language-toggle class="language-btn" />
    <theme-toggle class="dark-mode-btn" />

    @if (isStudent()) {
      <button
        mat-icon-button
        class="notifications-btn"
        [matBadge]="unreadCount()"
        [matBadgeHidden]="!unreadCount()"
        matBadgeColor="warn"
        [matMenuTriggerFor]="notificationsMenu"
        (menuOpened)="onNotificationsMenuOpened()"
        [attr.aria-label]="'NOTIFICATIONS.OPEN' | translate">
        <mat-icon>notifications</mat-icon>
      </button>

      <mat-menu #notificationsMenu="matMenu" panelClass="notifications-menu">
        <notifications-popover
          [notifications]="notifications()"
          [unreadCount]="unreadCount()"
          [isLoading]="notificationsLoading()"
          [isLoadingMore]="notificationsLoadingMore()"
          [hasMore]="notificationsHasMore()"
          (notificationOpen)="openNotification($event)"
          (notificationDelete)="deleteNotification($event)"
          (loadMore)="loadMoreNotifications()" />
      </mat-menu>
    }

    <button mat-icon-button routerLink="/profile" class="profile-btn"
      [attr.aria-label]="'COMMON.ACCESSIBILITY.OPEN_PROFILE' | translate">
      <img class="profile-btn-avatar" [src]="getHeaderAvatarUrl()" [alt]="currentUser()?.full_name ?? 'avatar'"
        (error)="onHeaderAvatarError($event)" />
    </button>
  </div>

</mat-toolbar>
